<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>かな — Учим хирагану и катакану</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0e17;
  --surface: #1a1826;
  --card: #211f2e;
  --border: #2e2b3f;
  --text: #fffffe;
  --muted: #a7a3c2;
  --hira: #ff6b9d;
  --kata: #00d4ff;
  --gold: #ffd166;
  --correct: #06d6a0;
  --wrong: #ef476f;
  --purple: #9b72cf;
  --glow-hira: rgba(255,107,157,0.25);
  --glow-kata: rgba(0,212,255,0.25);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── BACKGROUND BLOBS ── */
.blobs {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  overflow: hidden;
}
.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.18;
}
.blob1 { width: 500px; height: 500px; background: var(--hira); top: -150px; left: -100px; animation: drift1 14s ease-in-out infinite; }
.blob2 { width: 400px; height: 400px; background: var(--kata); bottom: -100px; right: -80px; animation: drift2 18s ease-in-out infinite; }
.blob3 { width: 300px; height: 300px; background: var(--purple); top: 40%; left: 50%; transform: translate(-50%,-50%); animation: drift3 12s ease-in-out infinite; }

@keyframes drift1 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(40px,30px) scale(1.05)} }
@keyframes drift2 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-30px,-20px) scale(1.08)} }
@keyframes drift3 { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.12)} }

/* ── FLOATING KANA BG ── */
.kana-rain {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  overflow: hidden; opacity: 0.04;
}
.kana-rain span {
  position: absolute;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 28px;
  animation: fall linear infinite;
  color: #fff;
}
@keyframes fall { from{transform:translateY(-60px)} to{transform:translateY(110vh)} }

/* ── LAYOUT ── */
#app { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }

/* ── SCREEN ── */
.screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 32px 20px; animation: fadeUp 0.5s ease both; }
.screen.active { display: flex; }
@keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

/* ══════════════ MENU ══════════════ */
#menu { text-align: center; gap: 0; }

.logo {
  margin-bottom: 12px;
}
.logo-kana {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 72px;
  font-weight: 900;
  line-height: 1;
  background: linear-gradient(135deg, var(--hira), var(--kata));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 30px rgba(255,107,157,0.4));
  display: block;
}
.logo-sub {
  font-size: 13px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 6px;
  font-weight: 600;
}

.tagline {
  font-size: 16px;
  color: var(--muted);
  margin: 28px 0 48px;
  font-weight: 400;
  line-height: 1.7;
}
.tagline b { color: var(--text); font-weight: 700; }

.mode-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
  width: 100%;
  max-width: 640px;
  margin-bottom: 40px;
}

.mode-card {
  border: 2px solid var(--border);
  border-radius: 20px;
  padding: 28px 16px 22px;
  cursor: pointer;
  background: var(--card);
  transition: all 0.25s cubic-bezier(.34,1.56,.64,1);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  position: relative;
  overflow: hidden;
}
.mode-card::before {
  content: '';
  position: absolute; inset: 0;
  opacity: 0;
  transition: opacity 0.3s;
}
.mode-card:hover { transform: translateY(-6px) scale(1.03); }
.mode-card:hover::before { opacity: 1; }

.mode-card.hira { --c: var(--hira); }
.mode-card.kata { --c: var(--kata); }
.mode-card.both { --c: var(--gold); }

.mode-card:hover { border-color: var(--c); box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 20px color-mix(in srgb, var(--c) 30%, transparent); }

.mode-icon {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 44px;
  font-weight: 900;
  color: var(--c);
  line-height: 1;
  filter: drop-shadow(0 0 10px color-mix(in srgb, var(--c) 60%, transparent));
}
.mode-name {
  font-size: 13px;
  font-weight: 800;
  color: var(--c);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.mode-desc {
  font-size: 11px;
  color: var(--muted);
  text-align: center;
  line-height: 1.5;
}

.difficulty-label {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}
.diff-row {
  display: flex;
  gap: 10px;
  margin-bottom: 48px;
}
.diff-btn {
  padding: 8px 22px;
  border-radius: 50px;
  border: 2px solid var(--border);
  background: var(--card);
  color: var(--muted);
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}
.diff-btn:hover, .diff-btn.active {
  border-color: var(--purple);
  color: var(--text);
  background: color-mix(in srgb, var(--purple) 15%, var(--card));
}
.diff-btn.active { box-shadow: 0 0 14px rgba(155,114,207,0.35); }

/* ══════════════ QUIZ ══════════════ */
#quiz { gap: 0; justify-content: flex-start; padding-top: 0; }

.quiz-topbar {
  width: 100%;
  max-width: 560px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 24px 0 32px;
}

.back-btn {
  background: none;
  border: 1.5px solid var(--border);
  color: var(--muted);
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  font-weight: 700;
  padding: 7px 16px;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.2s;
}
.back-btn:hover { border-color: var(--muted); color: var(--text); }

.progress-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
.progress-nums { font-size: 12px; color: var(--muted); font-weight: 700; }
.progress-bar-bg { width: 140px; height: 5px; background: var(--border); border-radius: 10px; overflow: hidden; }
.progress-bar-fill { height: 100%; border-radius: 10px; background: linear-gradient(90deg, var(--hira), var(--kata)); transition: width 0.5s cubic-bezier(.4,0,.2,1); }

.score-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 13px;
  font-weight: 800;
  color: var(--gold);
}
.score-badge::before { content: '★'; }

/* KANA CARD */
.kana-display {
  width: 100%;
  max-width: 560px;
  border-radius: 28px;
  border: 2px solid var(--border);
  background: var(--card);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 32px 40px;
  margin-bottom: 28px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.3s;
}

.kana-display::after {
  content: attr(data-type);
  position: absolute;
  top: 16px; left: 20px;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 50px;
  background: color-mix(in srgb, var(--type-color, var(--hira)) 15%, transparent);
  color: var(--type-color, var(--hira));
  border: 1px solid color-mix(in srgb, var(--type-color, var(--hira)) 35%, transparent);
}

.kana-char {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 120px;
  font-weight: 900;
  line-height: 1;
  color: var(--text);
  filter: drop-shadow(0 0 24px rgba(255,255,255,0.08));
  transition: transform 0.15s;
  user-select: none;
}

.kana-char.pop { animation: pop 0.3s cubic-bezier(.34,1.56,.64,1); }
@keyframes pop { 0%{transform:scale(0.7) rotate(-5deg)} 100%{transform:scale(1) rotate(0)} }

.kana-hint {
  font-size: 13px;
  color: var(--muted);
  margin-top: 18px;
  font-weight: 600;
  min-height: 20px;
  transition: opacity 0.3s;
}

/* OPTIONS */
.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  width: 100%;
  max-width: 560px;
}

.opt-btn {
  padding: 18px 20px;
  border-radius: 16px;
  border: 2px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  font-size: 20px;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.18s cubic-bezier(.34,1.56,.64,1);
  position: relative;
  overflow: hidden;
  letter-spacing: 0.04em;
}

.opt-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.03));
}

.opt-btn:hover:not(:disabled) {
  border-color: var(--purple);
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3), 0 0 16px rgba(155,114,207,0.2);
  color: var(--text);
  background: color-mix(in srgb, var(--purple) 12%, var(--card));
}

.opt-btn.correct {
  border-color: var(--correct);
  background: color-mix(in srgb, var(--correct) 15%, var(--card));
  color: var(--correct);
  animation: correctPop 0.4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes correctPop { 0%{transform:scale(1)} 50%{transform:scale(1.07)} 100%{transform:scale(1)} }

.opt-btn.wrong {
  border-color: var(--wrong);
  background: color-mix(in srgb, var(--wrong) 12%, var(--card));
  color: var(--wrong);
  animation: shake 0.35s ease;
}
@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-8px)}
  40%{transform:translateX(8px)}
  60%{transform:translateX(-5px)}
  80%{transform:translateX(5px)}
}

.opt-btn:disabled { cursor: default; }

/* FEEDBACK STRIP */
.feedback-strip {
  width: 100%;
  max-width: 560px;
  margin-top: 16px;
  padding: 14px 20px;
  border-radius: 14px;
  font-size: 15px;
  font-weight: 700;
  text-align: center;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  transform: translateY(8px);
  min-height: 52px;
}
.feedback-strip.show {
  opacity: 1;
  transform: translateY(0);
}
.feedback-strip.ok { background: color-mix(in srgb, var(--correct) 12%, var(--card)); color: var(--correct); border: 1.5px solid color-mix(in srgb, var(--correct) 30%, transparent); }
.feedback-strip.no { background: color-mix(in srgb, var(--wrong) 12%, var(--card)); color: var(--wrong); border: 1.5px solid color-mix(in srgb, var(--wrong) 30%, transparent); }

.next-btn {
  margin-top: 20px;
  padding: 14px 44px;
  border-radius: 50px;
  border: none;
  background: linear-gradient(135deg, var(--hira), var(--purple));
  color: #fff;
  font-family: 'Nunito', sans-serif;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
  box-shadow: 0 4px 20px rgba(255,107,157,0.3);
  letter-spacing: 0.04em;
}
.next-btn.show { opacity: 1; transform: translateY(0); }
.next-btn:hover { transform: translateY(-3px) scale(1.04); box-shadow: 0 8px 28px rgba(255,107,157,0.4); }

/* ══════════════ RESULTS ══════════════ */
#results { text-align: center; gap: 20px; }

.trophy {
  font-size: 80px;
  animation: bounceIn 0.6s cubic-bezier(.34,1.56,.64,1);
}
@keyframes bounceIn { 0%{transform:scale(0) rotate(-20deg)} 100%{transform:scale(1) rotate(0)} }

.result-title {
  font-size: 32px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--gold), var(--hira));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.result-score {
  font-size: 64px;
  font-weight: 900;
  color: var(--text);
  line-height: 1;
}
.result-score span { font-size: 24px; color: var(--muted); font-weight: 600; }
.result-msg { font-size: 15px; color: var(--muted); max-width: 360px; line-height: 1.7; font-weight: 500; }

.result-stats {
  display: flex;
  gap: 24px;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 20px;
  padding: 22px 32px;
}
.stat { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.stat-val { font-size: 28px; font-weight: 900; }
.stat-val.g { color: var(--correct); }
.stat-val.r { color: var(--wrong); }
.stat-val.b { color: var(--kata); }
.stat-label { font-size: 11px; color: var(--muted); font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }

.btn-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
.btn-primary {
  padding: 14px 36px;
  border-radius: 50px;
  border: none;
  background: linear-gradient(135deg, var(--hira), var(--purple));
  color: #fff;
  font-family: 'Nunito', sans-serif;
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(.34,1.56,.64,1);
  box-shadow: 0 4px 20px rgba(255,107,157,0.3);
}
.btn-primary:hover { transform: translateY(-3px) scale(1.04); }
.btn-secondary {
  padding: 14px 36px;
  border-radius: 50px;
  border: 2px solid var(--border);
  background: var(--card);
  color: var(--muted);
  font-family: 'Nunito', sans-serif;
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-secondary:hover { border-color: var(--muted); color: var(--text); }

/* Wrong answers list */
.wrong-list {
  width: 100%;
  max-width: 480px;
  text-align: left;
}
.wrong-list-title {
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}
.wrong-items {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.wrong-item {
  background: var(--card);
  border: 1.5px solid color-mix(in srgb, var(--wrong) 30%, var(--border));
  border-radius: 10px;
  padding: 6px 14px;
  font-size: 14px;
  font-weight: 700;
}
.wrong-item .kana { font-family: 'Noto Sans JP', sans-serif; color: var(--wrong); font-size: 18px; }
.wrong-item .rom { color: var(--muted); font-size: 12px; margin-left: 6px; }

/* RESPONSIVE */
@media (max-width: 480px) {
  .mode-grid { grid-template-columns: 1fr; }
  .kana-char { font-size: 90px; }
  .options-grid { grid-template-columns: 1fr 1fr; }
  .result-stats { gap: 16px; padding: 16px 20px; }
  .opt-btn { font-size: 17px; padding: 15px 12px; }
}
</style>
</head>
<body>

<div class="blobs">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
</div>
<div class="kana-rain" id="kanaRain"></div>

<div id="app">

  <!-- ══ MENU ══ -->
  <div class="screen active" id="menu">
    <div class="logo">
      <span class="logo-kana">かカ</span>
      <div class="logo-sub">Kana Quiz · Учим японский алфавит</div>
    </div>

    <p class="tagline">Выбери, что хочешь потренировать.<br><b>Нажми на карточку</b> — и поехали!</p>

    <div class="mode-grid">
      <div class="mode-card hira" onclick="startQuiz('hiragana')">
        <div class="mode-icon">あ</div>
        <div class="mode-name">Хирагана</div>
        <div class="mode-desc">46 символов<br>основной алфавит</div>
      </div>
      <div class="mode-card kata" onclick="startQuiz('katakana')">
        <div class="mode-icon">ア</div>
        <div class="mode-name">Катакана</div>
        <div class="mode-desc">46 символов<br>иностранные слова</div>
      </div>
      <div class="mode-card both" onclick="startQuiz('both')">
        <div class="mode-icon">混</div>
        <div class="mode-name">Всё вместе</div>
        <div class="mode-desc">оба алфавита<br>настоящий тест</div>
      </div>
    </div>

    <div class="difficulty-label">Сложность</div>
    <div class="diff-row">
      <button class="diff-btn active" id="d-easy" onclick="setDiff('easy')">⭐ Легко</button>
      <button class="diff-btn" id="d-med"  onclick="setDiff('medium')">⭐⭐ Средне</button>
      <button class="diff-btn" id="d-hard" onclick="setDiff('hard')">⭐⭐⭐ Хардкор</button>
    </div>
  </div>

  <!-- ══ QUIZ ══ -->
  <div class="screen" id="quiz">
    <div class="quiz-topbar">
      <button class="back-btn" onclick="goMenu()">← Назад</button>
      <div class="score-badge" id="scoreBadge">0</div>
      <div class="progress-wrap">
        <div class="progress-nums" id="progressNums">1 / 20</div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
      </div>
    </div>

    <div class="kana-display" id="kanaDisplay" data-type="Хирагана" style="--type-color: var(--hira)">
      <div class="kana-char" id="kanaChar">あ</div>
      <div class="kana-hint" id="kanaHint"></div>
    </div>

    <div class="options-grid" id="optionsGrid"></div>

    <div class="feedback-strip" id="feedbackStrip"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Следующий →</button>
  </div>

  <!-- ══ RESULTS ══ -->
  <div class="screen" id="results">
    <div class="trophy" id="trophy">🏆</div>
    <div class="result-title" id="resultTitle">Отлично!</div>
    <div class="result-score" id="resultScore">18 <span>/ 20</span></div>
    <div class="result-stats">
      <div class="stat"><div class="stat-val g" id="rCorrect">0</div><div class="stat-label">Верно</div></div>
      <div class="stat"><div class="stat-val r" id="rWrong">0</div><div class="stat-label">Ошибки</div></div>
      <div class="stat"><div class="stat-val b" id="rAcc">0%</div><div class="stat-label">Точность</div></div>
    </div>
    <p class="result-msg" id="resultMsg"></p>
    <div class="wrong-list" id="wrongList"></div>
    <div class="btn-row">
      <button class="btn-primary" onclick="retryQuiz()">Ещё раз</button>
      <button class="btn-secondary" onclick="goMenu()">В меню</button>
    </div>
  </div>

</div>

<script>
// ── DATA ──
const HIRA = [
  {k:'あ',r:'a'},{k:'い',r:'i'},{k:'う',r:'u'},{k:'え',r:'e'},{k:'お',r:'o'},
  {k:'か',r:'ka'},{k:'き',r:'ki'},{k:'く',r:'ku'},{k:'け',r:'ke'},{k:'こ',r:'ko'},
  {k:'さ',r:'sa'},{k:'し',r:'shi'},{k:'す',r:'su'},{k:'せ',r:'se'},{k:'そ',r:'so'},
  {k:'た',r:'ta'},{k:'ち',r:'chi'},{k:'つ',r:'tsu'},{k:'て',r:'te'},{k:'と',r:'to'},
  {k:'な',r:'na'},{k:'に',r:'ni'},{k:'ぬ',r:'nu'},{k:'ね',r:'ne'},{k:'の',r:'no'},
  {k:'は',r:'ha'},{k:'ひ',r:'hi'},{k:'ふ',r:'fu'},{k:'へ',r:'he'},{k:'ほ',r:'ho'},
  {k:'ま',r:'ma'},{k:'み',r:'mi'},{k:'む',r:'mu'},{k:'め',r:'me'},{k:'も',r:'mo'},
  {k:'や',r:'ya'},{k:'ゆ',r:'yu'},{k:'よ',r:'yo'},
  {k:'ら',r:'ra'},{k:'り',r:'ri'},{k:'る',r:'ru'},{k:'れ',r:'re'},{k:'ろ',r:'ro'},
  {k:'わ',r:'wa'},{k:'を',r:'wo'},{k:'ん',r:'n'},
];
const KATA = [
  {k:'ア',r:'a'},{k:'イ',r:'i'},{k:'ウ',r:'u'},{k:'エ',r:'e'},{k:'オ',r:'o'},
  {k:'カ',r:'ka'},{k:'キ',r:'ki'},{k:'ク',r:'ku'},{k:'ケ',r:'ke'},{k:'コ',r:'ko'},
  {k:'サ',r:'sa'},{k:'シ',r:'shi'},{k:'ス',r:'su'},{k:'セ',r:'se'},{k:'ソ',r:'so'},
  {k:'タ',r:'ta'},{k:'チ',r:'chi'},{k:'ツ',r:'tsu'},{k:'テ',r:'te'},{k:'ト',r:'to'},
  {k:'ナ',r:'na'},{k:'ニ',r:'ni'},{k:'ヌ',r:'nu'},{k:'ネ',r:'ne'},{k:'ノ',r:'no'},
  {k:'ハ',r:'ha'},{k:'ヒ',r:'hi'},{k:'フ',r:'fu'},{k:'ヘ',r:'he'},{k:'ホ',r:'ho'},
  {k:'マ',r:'ma'},{k:'ミ',r:'mi'},{k:'ム',r:'mu'},{k:'メ',r:'me'},{k:'モ',r:'mo'},
  {k:'ヤ',r:'ya'},{k:'ユ',r:'yu'},{k:'ヨ',r:'yo'},
  {k:'ラ',r:'ra'},{k:'リ',r:'ri'},{k:'ル',r:'ru'},{k:'レ',r:'re'},{k:'ロ',r:'ro'},
  {k:'ワ',r:'wa'},{k:'ヲ',r:'wo'},{k:'ン',r:'n'},
];

// Pool with type tag
const makePool = (arr, type) => arr.map(x => ({...x, type}));

// ── STATE ──
let mode = 'hiragana', diff = 'easy';
let pool = [], queue = [], qIdx = 0, score = 0, wrongItems = [];
let totalQ = 20, answered = false;

const DIFF_OPTS = { easy: 3, medium: 4, hard: 4 }; // number of options
const DIFF_Q    = { easy: 15, medium: 20, hard: 30 };

// ── KANA RAIN ──
(function() {
  const rain = document.getElementById('kanaRain');
  const chars = 'あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをんアイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
  for (let i = 0; i < 25; i++) {
    const s = document.createElement('span');
    s.textContent = chars[Math.floor(Math.random() * chars.length)];
    s.style.left = Math.random() * 100 + 'vw';
    s.style.top = Math.random() * -100 + 'px';
    s.style.animationDuration = (8 + Math.random() * 14) + 's';
    s.style.animationDelay = (Math.random() * 12) + 's';
    s.style.fontSize = (16 + Math.random() * 20) + 'px';
    rain.appendChild(s);
  }
})();

// ── UTILS ──
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── DIFFICULTY ──
function setDiff(d) {
  diff = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('d-' + (d === 'easy' ? 'easy' : d === 'medium' ? 'med' : 'hard')).classList.add('active');
}

// ── START ──
function startQuiz(m) {
  mode = m;
  if (m === 'hiragana') pool = makePool(HIRA, 'hiragana');
  else if (m === 'katakana') pool = makePool(KATA, 'katakana');
  else pool = [...makePool(HIRA, 'hiragana'), ...makePool(KATA, 'katakana')];

  totalQ = DIFF_Q[diff];
  queue = shuffle(pool).slice(0, totalQ);
  qIdx = 0; score = 0; wrongItems = [];

  showScreen('quiz');
  renderQuestion();
}

// ── QUESTION ──
function renderQuestion() {
  answered = false;
  const q = queue[qIdx];
  const numOpts = DIFF_OPTS[diff];

  // Update display
  const char = document.getElementById('kanaChar');
  char.textContent = q.k;
  char.classList.remove('pop');
  void char.offsetWidth;
  char.classList.add('pop');

  const display = document.getElementById('kanaDisplay');
  const isHira = q.type === 'hiragana';
  display.setAttribute('data-type', isHira ? 'Хирагана' : 'Катакана');
  display.style.setProperty('--type-color', isHira ? 'var(--hira)' : 'var(--kata)');

  // Hint (hard mode = no hint)
  const hint = document.getElementById('kanaHint');
  hint.textContent = diff === 'easy' ? (isHira ? 'Хирагана' : 'Катакана') : '';

  // Progress
  document.getElementById('progressNums').textContent = (qIdx + 1) + ' / ' + totalQ;
  document.getElementById('progressFill').style.width = (qIdx / totalQ * 100) + '%';
  document.getElementById('scoreBadge').textContent = score;

  // Options
  const allWrong = shuffle(pool.filter(x => x.r !== q.r)).slice(0, numOpts - 1);
  const opts = shuffle([q, ...allWrong]);
  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  grid.style.gridTemplateColumns = numOpts === 3 ? '1fr 1fr 1fr' : '1fr 1fr';

  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt.r;
    btn.onclick = () => handleAnswer(btn, opt.r === q.r, q);
    grid.appendChild(btn);
  });

  // Reset feedback
  const fb = document.getElementById('feedbackStrip');
  fb.className = 'feedback-strip';
  fb.textContent = '';
  document.getElementById('nextBtn').className = 'next-btn';
}

function handleAnswer(btn, correct, q) {
  if (answered) return;
  answered = true;

  const fb = document.getElementById('feedbackStrip');
  const allBtns = document.querySelectorAll('.opt-btn');
  allBtns.forEach(b => { b.disabled = true; });

  if (correct) {
    btn.classList.add('correct');
    score++;
    fb.textContent = '✓ Правильно! ' + q.k + ' = ' + q.r;
    fb.className = 'feedback-strip show ok';
    document.getElementById('scoreBadge').textContent = score;
  } else {
    btn.classList.add('wrong');
    // reveal correct
    allBtns.forEach(b => {
      if (b.textContent === q.r) b.classList.add('correct');
    });
    fb.textContent = '✗ Не совсем... ' + q.k + ' = ' + q.r;
    fb.className = 'feedback-strip show no';
    wrongItems.push(q);
  }

  document.getElementById('nextBtn').className = 'next-btn show';
}

function nextQuestion() {
  qIdx++;
  if (qIdx >= totalQ) {
    showResults();
  } else {
    renderQuestion();
  }
}

// ── RESULTS ──
function showResults() {
  const acc = Math.round(score / totalQ * 100);
  document.getElementById('rCorrect').textContent = score;
  document.getElementById('rWrong').textContent = totalQ - score;
  document.getElementById('rAcc').textContent = acc + '%';
  document.getElementById('resultScore').innerHTML = score + ' <span>/ ' + totalQ + '</span>';

  const msgs = [
    { min:90, trophy:'🏆', title:'Блестяще!', msg:'Ты просто мастер кана! Мемори на высоте, ошибок почти нет.' },
    { min:70, trophy:'🌟', title:'Отлично!', msg:'Отличный результат! Ещё немного практики — и будет идеально.' },
    { min:50, trophy:'💪', title:'Хороший старт!', msg:'Уже неплохо! Повторяй те символы, которые дались труднее.' },
    { min:0,  trophy:'🌱', title:'Продолжай учиться', msg:'Кана требует повторений. Учи по 5 символов в день — и всё получится!' },
  ];
  const m = msgs.find(x => acc >= x.min);
  document.getElementById('trophy').textContent = m.trophy;
  document.getElementById('resultTitle').textContent = m.title;
  document.getElementById('resultMsg').textContent = m.msg;

  const wl = document.getElementById('wrongList');
  if (wrongItems.length > 0) {
    const uniq = [...new Map(wrongItems.map(x => [x.k, x])).values()];
    wl.innerHTML = '<div class="wrong-list-title">Повтори эти символы:</div><div class="wrong-items">' +
      uniq.map(x => `<div class="wrong-item"><span class="kana">${x.k}</span><span class="rom">${x.r}</span></div>`).join('') +
      '</div>';
  } else {
    wl.innerHTML = '';
  }

  showScreen('results');
}

function retryQuiz() {
  startQuiz(mode);
}

function goMenu() {
  showScreen('menu');
}
</script>
</body>
</html>
